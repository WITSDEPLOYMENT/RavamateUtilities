  <div bis_skin_checked="1">
    <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">
      Frequency

    <div class="relative" bis_skin_checked="1">
      <select id="schedule-frequency"
        class="transition-all block w-full appearance-none rounded-lg border border-gray-300 p-2.5 text-sm text-gray-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none">

        <option value="0" selected="">Daily</option>
        <option value="1">Weekly</option>
        <option value="2" disabled="">Custom (Select Days)</option>

      </label>

      <label class="cursor-pointer">

          bis_skin_checked="1">
          Tuesday
        </div>
      </label>

      <label class="cursor-pointer">

        <div
          class="px-3 py-2 rounded-lg border border-slate-200 bg-white text-[13px] font-bold text-slate-500 hover:bg-slate-50 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:border-blue-500 transition-all shadow-sm"
          bis_skin_checked="1">
          Saturday
        </div>
      </label>

      <label class="cursor-pointer">
        <input type="checkbox" value="1" class="peer sr-only">

  <div bis_skin_checked="1">
